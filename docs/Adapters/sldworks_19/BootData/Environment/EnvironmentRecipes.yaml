# Рецепты среды (contract 3.2: adaptive_action_id + steps).
schema: environment-recipes/3.2
recipes:
  - id: kb_prefill_designation
    display_name: "Подготовить имя по КБ, записать свойства"
    description: Подставить обозначение в имя файла до Save (SetTitle2); Save не вызывается. Прописать  служебные свойства в доукменте
    adaptive_action_id: 38
    reactive_eligible: true
    steps:
      - type: invoke
        handler: save_file_name
      - type: invoke
        handler: set_custom_property_if_part
        config: document
        name: Обозначение
        overwrite: if_empty
        property_type: text
        template: "$PRP:\"SW-File Name\""
      - type: invoke
        handler: set_custom_property_if_part
        config: document
        name: Нужен dxf
        overwrite: if_empty
        property_type: boolean
        template: Yes
      - type: invoke
        handler: set_custom_property_if_part
        config: document
        name: Путь dxf
        overwrite: if_empty
        property_type: text

  - id: material_assign_session_learned
    display_name: Назначить выученный материал
    description: Материал последнего Save Part в этой папке; только пустая конфигурация
    adaptive_action_id: 40
    reactive_eligible: true
    steps:
      - type: invoke
        handler: assign_session_material

  - id: export_documentation_dialog
    display_name: Экспорт детали в dxf
    description: Модальный диалог — выбор каталога и сохранение DXF
    adaptive_action_id: 42
    reactive_eligible: true
    steps:
      - type: invoke
        handler: export_documentation_dialog

  - id: export_drawing_pdf_dialog
    display_name: Экспорт чертежа в PDF
    description: Модальный диалог — выбор каталога и сохранение PDF
    adaptive_action_id: 43
    reactive_eligible: true
    steps:
      - type: invoke
        handler: export_drawing_pdf_dialog

