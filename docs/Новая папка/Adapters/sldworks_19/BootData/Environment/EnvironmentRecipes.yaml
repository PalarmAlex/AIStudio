# Рецепты среды (contract 3.2: adaptive_action_id + steps).
schema: environment-recipes/3.2
recipes:
  - id: kb_prefill_designation
    display_name: Подготовить имя по КБ
    description: Подставить обозначение в имя файла до Save (SetTitle2); Save не вызывается
    adaptive_action_id: 38
    reactive_eligible: true
    steps:
      - type: invoke
        handler: save_file_name
        template: "$PRP:\"SW-Folder Name\":3.{SEQ:4}"

  - id: kb_apply_properties_saved
    display_name: Свойства КБ после сохранения
    description: Записать Обозначение и Наименование после успешного Save
    adaptive_action_id: 39
    reactive_eligible: true
    steps:
      - type: invoke
        handler: set_custom_property
        config: document
        name: Обозначение
        overwrite: if_empty
        template: "$PRP:\"SW-File Name\""
      - type: invoke
        handler: set_custom_property
        config: document
        name: Наименование
        overwrite: if_empty
        template: "$PRP:\"SW-File Name\""

  - id: material_assign_session_learned
    display_name: Назначить выученный материал
    description: Материал последнего Save Part в этой папке; только пустая конфигурация
    adaptive_action_id: 40
    reactive_eligible: true
    steps:
      - type: invoke
        handler: assign_session_material

